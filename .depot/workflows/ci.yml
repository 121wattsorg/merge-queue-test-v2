name: CI

on:
  pull_request:
  merge_group:

jobs:
  build:
    name: build
    runs-on: depot-ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Print event context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"

      - name: Run checks
        run: |
          echo "Running build checks..."
          if [ -f FAIL ]; then
            echo "FAIL marker detected — build broken!"
            exit 1
          fi
          echo "All checks passed."

      - name: Verify merge queue ref
        if: github.event_name == 'merge_group'
        run: |
          case "${{ github.ref }}" in
            refs/heads/gh-readonly-queue/*)
              echo "PASS: running inside merge queue (ref=${{ github.ref }})"
              ;;
            *)
              echo "FAIL: expected refs/heads/gh-readonly-queue/* but got ${{ github.ref }}"
              exit 1
              ;;
          esac
