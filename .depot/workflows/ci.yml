name: CI

on:
  pull_request:
  merge_group:

jobs:
  build:
    name: build
    runs-on: depot-ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Print event context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"

      - name: Run checks
        run: echo "All PR-level checks passed."

      - name: Merge queue integration check
        if: github.event_name == 'merge_group'
        run: |
          echo "Running merge queue integration checks..."
          echo "ref=${{ github.ref }}"
          if [ -f FAIL ]; then
            echo "FAIL marker detected — this combination breaks the build!"
            exit 1
          fi
          echo "PASS: merge queue checks passed"
